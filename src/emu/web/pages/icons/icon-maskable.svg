<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: safe zone is center 80% (409×409). Background fills full canvas. -->
  <rect width="512" height="512" fill="#0d0d0f"/>

  <!-- Safe-zone centered phone body (slightly smaller than icon.svg) -->
  <rect x="166" y="88" width="180" height="316" rx="28" fill="none" stroke="#e94560" stroke-width="16"/>

  <!-- Screen -->
  <rect x="188" y="122" width="136" height="192" rx="6" fill="#e94560" opacity="0.12"/>
  <rect x="188" y="122" width="136" height="192" rx="6" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>

  <!-- Play triangle -->
  <polygon points="238,186 238,258 306,222" fill="#e94560" opacity="0.9"/>

  <!-- Home button -->
  <circle cx="256" cy="358" r="18" fill="none" stroke="#e94560" stroke-width="12"/>
</svg>
